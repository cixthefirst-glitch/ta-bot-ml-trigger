name: daily-retrain
on:
  schedule:
    - cron: '0 11 * * *'   # 12:00 PM Lagos daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Backtest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python backtest.py
      - name: Train ML
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python ml/train.py
      - name: Commit updated data
        run: |
          git config user.name "ta-bot-ml-bot"
          git config user.email "bot@ta-ml.local"
          git add data/ || true
          # If nothing changed, exit cleanly
          git diff --cached --quiet && echo "No data changes to commit" && exit 0
          # Try a clean non-fast-forward commit first; on conflict, rebase onto origin/main
          if ! git commit -m "auto: retrain $(date -u +%FT%TZ)"; then
            echo "Commit failed (likely no changes)"
            exit 0
          fi
          # Push, but if rejected (non-fast-forward, e.g. someone else pushed), rebase and retry
          if ! git push origin HEAD:main; then
            echo "Push rejected, attempting rebase onto origin/main"
            git fetch origin main
            if git rebase origin/main; then
              git push origin HEAD:main
            else
              echo "Rebase failed - manual intervention needed"
              exit 1
            fi
          fi
