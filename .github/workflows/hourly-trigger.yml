name: hourly-trigger
on:
  schedule:
    - cron: '0 * * * *'   # top of every hour UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Fire ta-bot-ml hourly-scan via repository_dispatch
        run: |
          curl -sL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.TARGET_REPO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/cixthefirst-glitch/ta-bot-ml/dispatches" \
            -d '{"event_type":"hourly-scan","client_payload":{"source":"ta-bot-ml-trigger"}}'
          echo "Dispatch sent."
